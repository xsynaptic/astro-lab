packages:
  - packages/*
  - playground/*

# Local installs link the playground to the workspace package
# On StackBlitz (which boots the playground subdir as its own root) it resolves the published package
overrides:
  '@xsynaptic/remark-auto-import': workspace:*

# Keep pnpm from rewriting the playground's published range to workspace:*
saveWorkspaceProtocol: false

# Intended to mitigate supply chain attacks
minimumReleaseAge: 1440
verifyDepsBeforeRun: error
strictDepBuilds: true

allowBuilds:
  esbuild: true
  sharp: true
