packages:
  - packages/*
  - playground/*

# Link the playground to the local workspace package by range; StackBlitz boots the
# playground subdir as its own root and resolves the published package from npm instead
linkWorkspacePackages: true
saveWorkspaceProtocol: false

# Intended to mitigate supply chain attacks
minimumReleaseAge: 1440
verifyDepsBeforeRun: error
strictDepBuilds: true

minimumReleaseAgeExclude:
  # Bypass the 24h guard while Astro 7 prereleases still churn
  - 'astro'
  - '@astrojs/mdx'
  - '@astrojs/markdown-satteri'
  - 'satteri'

allowBuilds:
  esbuild: true
  sharp: true
